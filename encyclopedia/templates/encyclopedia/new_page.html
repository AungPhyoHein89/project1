{% extends "encyclopedia/layout.html" %}

{% block title %}
  Create new page
{% endblock %}

{% block body %}
  <h1>Create New Page</h1>
    {% if error %}
      <div class="alert alert-danger">
        {{ error }}
      </div>
    {% endif %}
    <form action="{% url 'new_page' %}" method="post" class="form-group">
      {% csrf_token %}

      {{ form.as_p }}

      <button type="submit" class="btn btn-primary">Save</button>

      <a href="{% url 'new_page' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
