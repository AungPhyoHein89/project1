{% extends "encyclopedia/layout.html" %}

{% block title %}
  Search results
{% endblock %}

{% block body %}
  <h1>Search results for {{ query }}</h1>
  {% if entries %}
    {% for entry in entries %}
      <ul>
        <li>
          <a href="{% url 'entry' title=entry %}">{{entry}}</a>
        </li>
      </ul>
    {% endfor %}
  {% else %}
    <div class="alert alert-danger">The requested page was not found.</div>
  {% endif %}
{% endblock %}
