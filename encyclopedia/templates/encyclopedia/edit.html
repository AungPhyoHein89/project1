{% extends "encyclopedia/layout.html" %}

{% block title %}
  Edit: {{ title }}
{% endblock %}

{% block body %}
  <h1>Edit Page for {{ title }}</h1>

  <form action="{% url 'edit' title=title %}"  class="form-group" method="post">
    {% csrf_token %}
    
      <textarea name="content" class="form-control" rows="10">{{ content }}</textarea>
      
      <button class="btn btn-primary" type="submit">Save Change</button>
      <br><br>
      <a href="{% url 'entry' title=title %}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
